<header class="header-section py-2 py-md-5">
  <div class="container">
    <div class="language-switcher d-flex gap-2 justify-content-end mb-2">
      <img src="/assets/flags/br.svg" alt="Português" class="flag-icon" />
      <img src="/assets/flags/us.svg" alt="English" class="flag-icon" />
      <img src="/assets/flags/es.svg" alt="Español" class="flag-icon" />
    </div>
    <div class="header-content">
      <!-- AVISO DO COMPONENTE -->
      <!--  <span class="component-notice energy-pulse" role="status" aria-live="polite">
        ⚙️ Isto aqui é um componente Angular
      </span> -->
      <!-- COLUNA DO AVISO (mobile invertido / md+ normal + mb-md-3) -->
      <!-- COLUNA DO TÍTULO (mobile invertido / md+ normal) -->
      <div class="row">
        <div class="col-12 col-md-6 order-2 order-md-1">
          <h1 class="mt-lg-0" itemscope itemtype="https://schema.org/Person">
            <span itemprop="name">{{ profileData.name }}</span>
          </h1>
        </div>
        <div
          class="col-12 col-md-6 d-flex align-items-center justify-content-md-end mt-2 mt-md-0 order-1 order-md-2"
        >
          <span class="component-notice notice-responsive" role="status" aria-live="polite">
            ⚡ Componente Angular
          </span>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <p class="title-main mb-3" itemprop="jobTitle">
            {{ profileData.jobTitle }}
          </p>
        </div>

        <div class="col-md-4">
          <div class="d-flex flex-wrap gap-3 justify-content-center my-3">
            <span class="badge badge-remote rounded-pill">
              <i class="bi bi-phone"></i> Mobile First
            </span>
          </div>
        </div>

        <div class="col-md-4">
          <div class="d-flex flex-wrap gap-3 justify-content-center my-3">
            <span class="badge badge-remote rounded-pill">
              <i class="bi bi-rulers"></i> Perfect Pixel
            </span>
          </div>
        </div>

        <div class="col-md-4">
          <div class="d-flex flex-wrap gap-3 justify-content-center my-3">
            <span class="badge badge-remote rounded-pill">
              <i class="bi bi-globe-americas"></i> Disponível para Trabalho Remoto
            </span>
          </div>
        </div>
      </div>

      <div class="row g-3 mt-3">
        <div class="col-md-4 d-flex flex-wrap justify-content-center">
          <div class="contact-item">
            <i class="bi bi-geo-alt-fill"></i>
            <span itemprop="address">{{ profileData.location }}</span>
          </div>
        </div>

        <div class="col-md-4 d-flex flex-wrap justify-content-center">
          <div class="contact-item">
            <i class="bi bi-envelope-fill"></i>
            <a
              href="mailto:{{ profileData.email }}"
              class="text-decoration-none"
              style="color: var(--text-muted)"
              itemprop="email"
            >
              {{ profileData.email }}
            </a>
          </div>
        </div>

        <div class="col-md-4 d-flex flex-wrap justify-content-center">
          <div class="contact-item">
            <i class="bi bi-telephone-fill"></i>
            <span itemprop="telephone">{{ profileData.phone }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
