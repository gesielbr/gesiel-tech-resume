<article class="content-card p-4">
  <section>
    <h2 class="section-title">Experiência Profissional</h2>

    @for (exp of experiences; track exp.id) {
    <div class="experience-card" itemscope [attr.itemtype]="'https://schema.org/' + exp.schemaType">
      <div class="company-name" [attr.itemprop]="'employer'">{{ exp.company }}</div>
      <div class="job-title" [attr.itemprop]="'jobTitle'">{{ exp.jobTitle }}</div>

      <div class="period mb-3">
        <i class="bi bi-calendar-event"></i>
        <time [attr.datetime]="exp.startDate">{{ formatDate(exp.startDate) }}</time> - @if
        (exp.currentJob) {
        <span>Presente</span>
        } @else {
        <time [attr.datetime]="exp.endDate">{{ formatDate(exp.endDate) }}</time>
        }
      </div>

      <ul [attr.itemprop]="'description'">
        @for (item of exp.description; track item) {
        <li>{{ item }}</li>
        }
      </ul>
    </div>
    }
  </section>
</article>
